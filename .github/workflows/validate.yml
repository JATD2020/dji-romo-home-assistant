name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.13"
            home-assistant-version: "2025.1.0"
          - python-version: "3.14"
            home-assistant-version: "2026.7.2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: >-
          python -m pip install
          homeassistant==${{ matrix.home-assistant-version }}
          paho-mqtt==2.1.0
          pytest==9.1.1
          ruff==0.15.22
      - name: Check Python style
        run: ruff check custom_components tests
      - name: Check Python formatting
        run: ruff format --check custom_components tests
      - name: Run unit tests
        run: pytest -q
      - name: Import integration modules
        run: >-
          python -c "import importlib, pkgutil, custom_components.dji_romo as package;
          [importlib.import_module(module.name) for module in
          pkgutil.iter_modules(package.__path__, package.__name__ + '.')]"

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
